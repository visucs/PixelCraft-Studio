name: CI/CD — Build aur Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════
  # STEP 1 — BUILD (CI)
  # ════════════════════════════════
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - run: npm run build
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      - name: Build folder save karo
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  # ════════════════════════════════
  # STEP 2 — GITHUB PAGES (CD)
  # ════════════════════════════════
  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install
      - run: npm run build
        env:
          VITE_BASE_PATH: /PixelCraft-Studio/
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # ════════════════════════════════
  # STEP 3 — VERCEL (CD)
  # ════════════════════════════════
  deploy-vercel:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Vercel pe deploy karo
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ════════════════════════════════
  # Docker Image Build
  # ════════════════════════════════
  docker-build:
    name: Docker Image Build
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Docker image banao
        run: docker build -t pixelcraft-studio .

      - name: Image test karo
        run: |
          # docker run -d -p 3000:80 --name test pixelcraft-studio
          # sleep 5
          # curl http://localhost:3000
          # docker stop test

